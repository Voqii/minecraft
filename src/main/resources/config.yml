# Set a default custom join message. {NAME} will be replaced with player's name. Leave empty for default Minecraft message.
custom_join_message: ""
# Set a default prefix for all custom join messages.
custom_join_message_prefix: ""

# Set a default leave join message, {NAME} will be replaced with player's name. Leave empty for default Minecraft message.
custom_leave_message: ""
# Set a default prefix for all custom leave messages.
custom_leave_message_prefix: ""

# AFK messages require EssentialsX to be installed (they are triggered by Essentials' AFK status).
# Set a default AFK message, {NAME} will be replaced with player's name. Leave empty to broadcast nothing.
custom_afk_message: ""
# Set a default prefix for all custom AFK messages.
custom_afk_message_prefix: ""

# Set a default return (no-longer-AFK) message, {NAME} will be replaced with player's name. Leave empty to broadcast nothing.
custom_return_message: ""
# Set a default prefix for all custom return messages.
custom_return_message_prefix: ""

# Custom messages are stored here
saved_messages:
  join:
  leave:
  afk:
  return:

# Per-player AFK broadcast preferences, toggled in-game with /cm afktoggle.
# When a player's value is false, their AFK/return changes are NOT announced in
# chat (they still show as AFK in the tab list - that is handled by Essentials).
# A missing entry means broadcasting is enabled by default. Does not affect join/leave.
afk_broadcast:
